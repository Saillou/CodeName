name: Godot CI

on:
  push:
  pull_request:

jobs:
  smoke-test:
    name: Import project and smoke test
    runs-on: ubuntu-latest

    env:
      GODOT_VERSION: "4.6"
      GODOT_EXECUTABLE: "Godot_v4.6-stable_linux.x86_64"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Godot
        run: |
          curl -L -o godot.zip "https://downloads.godotengine.org/?flavor=stable&platform=linux.64&slug=linux.x86_64.zip&version=${GODOT_VERSION}"
          unzip godot.zip -d godot
          chmod +x "godot/${GODOT_EXECUTABLE}"

      - name: Import assets
        run: ./godot/${GODOT_EXECUTABLE} --headless --path . --import --quit --verbose

      - name: Run smoke test
        run: ./godot/${GODOT_EXECUTABLE} --headless --path . -s res://Scenes/Scripts/dev/smoke_test_runner.gd --verbose
